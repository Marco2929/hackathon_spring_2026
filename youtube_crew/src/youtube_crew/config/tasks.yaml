manage_link_queue:
  description: >
    Schritt 1: Nutze das Tool 'get_and_complete_amazon_link'.
    Schritt 2: Analysiere die JSON-Rückgabe.
    - Wenn der Status 'success' ist, ist deine Aufgabe beendet. Die Extrahiert URL ist dein Output.
    - Wenn der Status 'empty' ist, nutze das Tool 'amazon_bestseller_scraper'. 
      Sobald dieser durchgelaufen ist, wiederhole Schritt 1, um einen nun verfügbaren Link zu holen.
  expected_output: "Ausschließlich die nackte Amazon-URL als String."
  agent: link_manager

extract_product_data:
  description: >
    Nimm die URL, die dir aus dem Task 'manage_link_queue' übergeben wurde, und nutze dein Scraping-Tool, um die Produktseite vollständig auszulesen.
    
    Verarbeite die extrahierten Rohdaten in der vom Tool gespeicherten JSON Datei direkt im Anschluss nach folgenden strikten Vorgaben:
    1. Bereinige die Produktbeschreibung von UI-Resten.
    2. Liste alle Bullet-Points (Marketing-Versprechen) separat auf.
    3. Extrahiere aus dem Rezensions-Dump eine Liste aller Nutzerwahrnehmungen und verknüpfe jedes Feature (z.B. Kamera, Akku, Display) mit den dazugehörigen Nutzerzitaten oder Stichpunkten.
    4. Isoliere die KI-generierte Zusammenfassung "Die Kunden sagen", falls vorhanden.
    5. Behalte alle Pfade zu den Produktbildern intakt.
  expected_output: >
    Ein strukturiertes Markdown-Dokument, das folgende Sektionen enthält:
    - [PRODUKT_NAME & ASIN]:
    - [PREIS]:
    - [PRODUKTBESCHREIBUNG]:
    - [NUTZER_FEEDBACK]:
    - [KI_KUNDENZUSAMMENFASSUNG]:
    - [BILD_PFADE]:
  agent: data_processor
  context: [manage_link_queue]

analyze_product_task:
  description: >
    Du hast Zugriff auf die Bildpfade aus dem vorherigen Schritt. 
    WICHTIG: Die Bilder befinden sich physisch im Ordner 'output/product_data/images'.
    Stelle sicher, dass jeder Pfad, den du an das Tool übergibst, mit diesem Ordner beginnt 
    (z.B. 'output/product_data/images/product_image_01.jpg').
    Füge alle Pfade kommagetrennt zusammen.
    Übergib diesen String an das Tool 'multi_image_description_tool'.
    Analysiere die Rückgabe des Tools sorgfältig.
  expected_output: >
    Eine strukturierte Liste, in der jedem Dateinamen und die entsprechende visuelle Beschreibung.
  agent: image_discription_expert
  context: [extract_product_data]

create_shorts_script_task:
  description: >
    Nutze das strukturierte Dossier aus der vorherigen Aufgabe (extract_product_data),
    um ein YouTube Shorts Skript zu schreiben.
    Halte dich an dieses strikte Format:
    00-03s: Der Hook (Ein krasser Fakt oder eine provokante Frage zum Produkt).
    03-15s: Das Marketing-Versprechen (Was sagt der Hersteller?).
    15-45s: Die Realität (Nutze das Nutzer-Feedback! Was sind die 2 größten Probleme oder Überraschungen?).
    45-55s: Das Urteil (Kaufen oder Finger weg?).
    55-60s: Der Loop (Beende das Video so, dass es nahtlos wieder zum Anfang passt).
    Das Skript wird im Anschluss von einem Image Generator benutzt um genau 4 Szenenbilder zu erstellen, die anschließend von einem 
    Video Generator animiert werden. 
    Erstelle erst eine Beschreibung für den Image Generator, damit dieser mit den Produktbildern eine gute Szene erstellen kann. 
    Nutze dabei den Tag [SCENE:] und achte darauf das es eine stationäre Bildbeschreibung ist.
    Du darfst selbst entscheiden welche Produktbilder du für die Szenen nutzt, aber du musst die Bildpfade aus dem Dossier verwenden. 
    Lese dabei aus den Bildbeschreibungen, ob diese passend sind. 
    Für den Video Generator erstelle nun eine Beschreibung, die die Szene lebendig erscheinen lässt, 
    bitte beachte das der Video Generator nur 5 Sekunden an Videomaterial generiert und dabei das Szenebild als Start erhält, nutze hierfür den Tag [VIDEO:].
    Der gesprochene Text darf unter keinen Umständen länger als 60 Sekunden sein! Halte es kurz, prägnant und spannend. Füge sowohl bei [SCENE:] als auch bei [VIDEO:] den Dateinamen des verwendeten Files hinzu.
  expected_output: >
    Ein Skript, das exakt auf 60 Sekunden optimiert ist und die Pfade zu den verwendeten Produktbildern.
  agent: short_script_expert
  context: [extract_product_data, analyze_product_task]

generate_scene_images_task:
  description: >
    Nimm das finale Skript aus create_shorts_script_task und extrahiere alle [SCENE:]
    Szenenbeschreibungen. Nutze außerdem die Bilddateien. Die Bilder befinden sich physisch im Ordner 'output/product_data/images'.

    Rufe das Tool 'openrouter_scene_image_generator' genau einmal auf und übergib:
    - scene_descriptions: Scene description separiert mit Semicolons
    - images_paths: Bildpfade separiert mit Semicolons

    Anforderungen:
    1. Erzeuge pro Szene genau ein Bild.
    2. Speichere die Bilder unter output/scene_images/.
    3. Erfinde keine Dateipfade.
    4. Gib als Ergebnis eine geordnete Liste Szene -> Bildpfad zurück.
  expected_output: >
    Eine bestaetigte Mapping-Liste aller Szenenbilder inkl. Dateipfaden in output/scene_images/.
  agent: scene_image_generator
  context: [create_shorts_script_task]

create_tts_audio_task:
  description: >
    Nimm das finale Skript aus create_shorts_script_task und erstelle daraus eine
    Voiceover-Audiodatei mit dem Edge-TTS-Tool.

    Anforderungen:
    1. Entferne Regie- und Visual-Hinweise wie [Visual] aus dem zu sprechenden Text.
    2. Erzeuge die Audio-Datei mit Stimme de-DE-FlorianMultilingualNeural.
    3. Speichere die Ausgabe unter output/tts/youtube_short.mp3.
    4. Gib als Ergebnis den finalen gesprochenen Text und den absoluten/relativen Dateipfad aus.
  expected_output: >
    Eine bestaetigte TTS-Erzeugung mit Dateipfad (output/tts/youtube_short.mp3)
    und dem bereinigten Narrationstext.
  agent: tts_narration_expert
  context: [create_shorts_script_task]

generate_video_clips_task:
  description: >
    Nimm das finale Skript aus create_shorts_script_task und extrahiere alle [VIDEO:]
    Szenenbeschreibungen. Nutze außerdem die Bilddateien die von generate_scene_images_task generiert wurden. 
    Die Bilder befinden sich physisch im Ordner 'output/scene_images'.

    Rufe das Tool 'comfyui_tool' genau einmal auf und übergib:
    - scene_descriptions: Scene description separiert mit Semicolons
    - images_paths: Scene Bildpfade separiert mit Semicolons

    Anforderungen:
    1. Erzeuge pro Szene genau ein Video.
    2. Speichere die Video unter output/comfyui/.
    3. Erfinde keine Dateipfade.
    4. Gib als Ergebnis eine geordnete Liste Szene -> Videopfade zurück.
  expected_output: >
    Eine bestaetigte Mapping-Liste aller Videos inkl. Dateipfaden in output/comfyui
  agent: video_production_assistant
  context: [create_shorts_script_task, generate_scene_images_task]

fuse_video_task:
  description: >
    Nimm den erzeugten Clip-Pfad aus generate_video_clips_task sowie die TTS-Ausgabe aus
    create_tts_audio_task und erstelle daraus ein einziges finales MP4.

    Anforderungen:
    1. Verwende den generierten Clip-Pfad.
    2. Verwende die erzeugte Audiodatei output/tts/youtube_short.mp3.
    3. Nutze das Tool video_fusion_tool, um die Clips zu concat-en und mit Audio zu muxen.
    4. Speichere das Ergebnis als output/final/youtube_short_final.mp4.
    5. Gib den finalen Dateipfad als Ergebnis aus.

    Wichtig: Erfinde keine Dateipfade. Wenn Pfade fehlen, melde den Fehler klar.
  expected_output: >
    Eine bestaetigte finale MP4-Datei mit Pfad output/final/youtube_short_final.mp4.
  agent: fusion_agent
  context: [generate_video_clips_task, create_tts_audio_task]

upload_youtube_video_task:
  description: >
    Nimm das finale MP4 aus fuse_video_task und lade es auf YouTube hoch.

    Anforderungen:
    1. Verwende das YouTube Data API Upload-Tool.
    2. Nutze den finalen Videopfad aus der Fusion.
    3. Vergib einen passenden Titel und eine kurze Beschreibung.
    4. Gib die bestätigte YouTube-URL aus.
  expected_output: >
    Eine bestaetigte YouTube-Video-URL.
  agent: youtube_uploader_agent
  context: [fuse_video_task, create_shorts_script_task]