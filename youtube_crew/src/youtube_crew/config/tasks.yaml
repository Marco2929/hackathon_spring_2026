manage_link_queue:
  description: >
    Step 1: Use the tool 'get_and_complete_amazon_link'.
    Step 2: Analyze the JSON return.
    - If the status is 'success', your task is finished. The extracted URL is your output.
    - If the status is 'empty', use the tool 'amazon_bestseller_scraper'. 
      As soon as it has finished running, repeat Step 1 to fetch a now available link.
  expected_output: "Exclusively the bare Amazon URL as a string."
  agent: link_manager

extract_product_data:
  description: >
    Take the URL passed to you from the 'manage_link_queue' task and use your scraping tool to fully read the product page.
    
    Process the extracted raw data directly afterward in the JSON file saved by the tool according to the following strict guidelines:
    1. Clean the product description of UI remnants.
    2. List all bullet points (marketing promises) separately.
    3. Extract a list of all user perceptions from the review dump and link each feature (e.g., camera, battery, display) with the corresponding user quotes or bullet points.
    4. Isolate the AI-generated summary "Customers say", if present.
    5. Keep all paths to the product images intact.
  expected_output: >
    A structured Markdown document containing the following sections:
    - [PRODUCT_NAME & ASIN]:
    - [PRICE]:
    - [PRODUCT_DESCRIPTION]:
    - [USER_FEEDBACK]:
    - [AI_CUSTOMER_SUMMARY]:
    - [IMAGE_PATHS]:
  agent: data_processor
  context: [manage_link_queue]

analyze_product_task:
  description: >
    You have access to the image paths from the previous step. 
    IMPORTANT: The images are physically located in the folder 'output/product_data/images'.
    Ensure that every path you pass to the tool starts with this folder 
    (e.g., 'output/product_data/images/product_image_01.jpg').
    Merge all paths together, separated by commas.
    Pass this string to the tool 'multi_image_description_tool'.
    Carefully analyze the return of the tool.
  expected_output: >
    A structured list containing each file name and the corresponding visual description.
  agent: image_discription_expert
  context: [extract_product_data]

create_shorts_script_task:
  description: >
    Use the structured dossier from the previous task (extract_product_data)
    to write a YouTube Shorts script in English.
    Adhere to this strict format:
    00-03s: The Hook (A striking fact or a provocative question about the product).
    03-15s: The Marketing Promise (What does the manufacturer say?).
    15-45s: The Reality (Use the user feedback! What are the 2 biggest problems or surprises?).
    45-55s: The Verdict (Buy or stay away?).
    55-60s: The Loop (End the video so that it seamlessly fits back to the beginning).
    
    The script is subsequently used by an image generator to create exactly 4 scene images, which are then animated by a video generator. 
    
    CRITICAL INSTRUCTIONS FOR IMAGE GENERATION ([SCENE:]):
    First, create a description for the image generator so that it can create a good scene using the product images. 
    Use the tag [SCENE:] and ensure that it is a purely stationary, visual image description, use english for it.
    CRITICAL: The [SCENE:] prompt MUST NOT contain any spoken text, narration, dialogue, or marketing slogans. It must be a highly descriptive, purely visual setup (e.g., "A clean, photorealistic product shot of a black tablet lying flat on a wooden desk, studio lighting, 8k resolution, highly detailed, NO text, NO watermarks"). You MUST explicitly instruct the image generator to avoid generating any text, letters, or UI overlays.
    
    You may decide for yourself which product images you use for the scenes, but you must use the image paths from the dossier. 
    Read from the image descriptions to see if they are suitable. 
    
    INSTRUCTIONS FOR VIDEO GENERATION ([VIDEO:]):
    For the video generator, now create a description in english that makes the scene appear alive;
    please note that the video generator only generates 5 seconds of video material and receives the scene image as a starting point, use the tag [VIDEO:] for this. Focus purely on subtle motions (e.g., "camera slowly pans right, dynamic reflections move across the screen").
    
    The spoken text must under no circumstances be longer than 60 seconds! Keep it short, concise, and exciting. Include the file name of the used file for both [SCENE:] and [VIDEO:].
  expected_output: >
    A script optimized for exactly 60 seconds with completely text-free visual scene descriptions, animation instructions, and the paths to the product images used.
  agent: short_script_expert
  context: [extract_product_data, analyze_product_task]

generate_scene_images_task:
  description: >
    Take the final script from create_shorts_script_task and extract all [SCENE:]
    scene descriptions. Also use the image files. The images are physically located in the folder 'output/product_data/images'.

    Call the tool 'openrouter_scene_image_generator' exactly once and pass:
    - scene_descriptions: Scene descriptions separated by semicolons
    - images_paths: Image paths separated by semicolons

    Requirements:
    1. Generate exactly one image per scene.
    2. Save the images under output/scene_images/.
    3. Do not invent file paths.
    4. Return an ordered list mapping scene -> image path as the result.
  expected_output: >
    A confirmed mapping list of all scene images incl. file paths in output/scene_images/.
  agent: scene_image_generator
  context: [create_shorts_script_task]

create_tts_audio_task:
  description: >
    Take the final script from create_shorts_script_task and create a
    voiceover audio file from it using the TTS tool.

    Requirements:
    1. Remove stage directions and visual cues like [Visual] from the text to be spoken.
    2. Generate the audio file.
    3. Save the output under output/tts/youtube_short.mp3.
    4. Output the final spoken text and the absolute/relative file path as the result.
  expected_output: >
    A confirmed TTS generation with file path (output/tts/youtube_short.mp3)
    and the cleaned narration text.
  agent: tts_narration_expert
  context: [create_shorts_script_task]

generate_video_clips_task:
  description: >
    Take the final script from create_shorts_script_task and extract all [VIDEO:]
    scene descriptions. Also use the image files generated by generate_scene_images_task. 
    The images are physically located in the folder 'output/scene_images'. They have a png ending.

    Call the tool 'api_video_gen_tool' exactly once and pass:
    - scene_descriptions: Scene descriptions separated by semicolons
    - images_paths: Scene image paths separated by semicolons

    Requirements:
    1. Generate exactly one video per scene.
    2. Save the videos under output/veo_videos/.
    3. Do not invent file paths.
    4. Return an ordered list mapping scene -> video paths as the result.
  expected_output: >
    A confirmed mapping list of all videos incl. file paths in output/veo_videos
  agent: video_production_assistant
  context: [create_shorts_script_task, generate_scene_images_task]

fuse_video_task:
  description: >
    Take the generated clip path from generate_video_clips_task as well as the TTS output from
    create_tts_audio_task and create a single final MP4 from them.

    Requirements:
    1. Use the generated clip path.
    2. Use the generated audio file output/tts/youtube_short.mp3.
    3. Use the video_fusion_tool tool to concat the clips and mux them with audio.
    4. Save the result as output/final/youtube_short_final.mp4.
    5. Output the final file path as the result.

    Important: Do not invent file paths. If paths are missing, report the error clearly.
  expected_output: >
    A confirmed final MP4 file with path output/final/youtube_short_final.mp4.
  agent: fusion_agent
  context: [generate_video_clips_task, create_tts_audio_task]

upload_youtube_video_task:
  description: >
    Take the final MP4 from fuse_video_task and upload it to YouTube.

    Requirements:
    1. Use the YouTube Data API upload tool.
    2. Use the final video path from the fusion process.
    3. Assign a suitable title and a short description.
    4. Output the confirmed YouTube URL.
  expected_output: >
    A confirmed YouTube video URL.
  agent: youtube_uploader_agent
  context: [fuse_video_task, create_shorts_script_task]